# ailab Hermes Agent — per-user containerized
#
# 多用户隔离拓扑（每个用户一个独立 Hermes 容器）：
#
#   nginx (host) ──/hermes/u3/───→ 127.0.0.1:8642 ──→ hermes-u3:8642   (owner)
#               ──/hermes/u9/───→ 127.0.0.1:8643 ──→ hermes-u9:8642
#               ──/hermes/u550/─→ 127.0.0.1:8644 ──→ hermes-u550:8642
#
# 每个容器内部端口都是 8642，只是宿主机映射端口不同。
# 数据完全隔离：各自 bind mount 独立数据卷，共享只读 skills 目录。
#
# 启动：
#   cp .env.example .env  # 填 HERMES_INTERNAL_TOKEN，按需改路径
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose up -d
#
# 新增用户：
#   1. 在本文件中添加 hermes-u<N> 服务（递增宿主机端口）
#   2. 在 .env 中添加 HERMES_U<N>_DATA 路径
#   3. 在 nginx.conf 中添加 /hermes/u<N>/ location
#   4. 在 .env 中更新 HERMES_USER_CONTAINERS_JSON 映射

x-hermes-common: &hermes-common
  image: ailab/hermes:${HERMES_TAG:-latest}
  build:
    context: ../..
    dockerfile: deploy/docker/Dockerfile.ailab
    args:
      HERMES_VERSION: ${HERMES_VERSION:-853ed609a1a4ac056e810d7d3172c71517762420}
  restart: unless-stopped
  networks:
    - ailab-net
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment: &hermes-env
    HERMES_UID: ${HERMES_UID:-1000}
    HERMES_GID: ${HERMES_GID:-1000}
    DJANGO_BASE_URL: http://host.docker.internal:8004
    HERMES_INTERNAL_TOKEN: ${HERMES_INTERNAL_TOKEN}
    API_SERVER_HOST: 0.0.0.0
    API_SERVER_KEY: ${HERMES_API_KEY:-ailab-hermes-2026}
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  # 每用户资源限制（多实例共存，保守分配）
  mem_limit: 512m
  memswap_limit: 768m
  cpus: 1.0
  pids_limit: 1024

services:
  # ──────────────────────────────────────
  # User 3 — owner (13818524101@163.com)
  # ──────────────────────────────────────
  hermes-u3:
    <<: *hermes-common
    container_name: ailab-hermes-u3
    ports:
      - "127.0.0.1:8642:8642"
    volumes:
      - ${HERMES_U3_DATA:-./hermes-data-u3}:/opt/data
      - ../../skills:/opt/ailab-skills:ro
      # 临时方案 A：三个用户容器共享 owner 的 ~/.hermes/{.env,config.yaml}
      # .env 提供 LLM provider API keys；config.yaml 提供 model 选择、agent 设置等。
      # sessions/、state.db、auth.json 等 user-level 数据仍走 per-user /opt/data，
      # 等 per-user 凭证 + 配置就位后改为各自版本即可。
      # 容器里 HERMES_HOME=/opt/data 直接是 hermes 的"home"，所以 .env / config.yaml
      # 都挂在 root（不是 /opt/data/.hermes/）——entrypoint.sh 也是从这里 chmod 640
      - ${HERMES_OWNER_ENV:-/home/admin/.hermes/.env}:/opt/data/.env:ro
      - ${HERMES_OWNER_CONFIG:-/home/admin/.hermes/config.yaml}:/opt/data/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/api/tools -H 'Authorization: Bearer ${HERMES_API_KEY:-ailab-hermes-2026}' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ──────────────────────────────────────
  # User 9 — gzhang1819298200@gmail.com
  # ──────────────────────────────────────
  hermes-u9:
    <<: *hermes-common
    container_name: ailab-hermes-u9
    ports:
      - "127.0.0.1:8643:8642"
    volumes:
      - ${HERMES_U9_DATA:-./hermes-data-u9}:/opt/data
      - ../../skills:/opt/ailab-skills:ro
      # 容器里 HERMES_HOME=/opt/data 直接是 hermes 的"home"，所以 .env / config.yaml
      # 都挂在 root（不是 /opt/data/.hermes/）——entrypoint.sh 也是从这里 chmod 640
      - ${HERMES_OWNER_ENV:-/home/admin/.hermes/.env}:/opt/data/.env:ro
      - ${HERMES_OWNER_CONFIG:-/home/admin/.hermes/config.yaml}:/opt/data/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/api/tools -H 'Authorization: Bearer ${HERMES_API_KEY:-ailab-hermes-2026}' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ──────────────────────────────────────
  # User 550 — 775872646@qq.com
  # ──────────────────────────────────────
  hermes-u550:
    <<: *hermes-common
    container_name: ailab-hermes-u550
    ports:
      - "127.0.0.1:8644:8642"
    volumes:
      - ${HERMES_U550_DATA:-./hermes-data-u550}:/opt/data
      - ../../skills:/opt/ailab-skills:ro
      # 容器里 HERMES_HOME=/opt/data 直接是 hermes 的"home"，所以 .env / config.yaml
      # 都挂在 root（不是 /opt/data/.hermes/）——entrypoint.sh 也是从这里 chmod 640
      - ${HERMES_OWNER_ENV:-/home/admin/.hermes/.env}:/opt/data/.env:ro
      - ${HERMES_OWNER_CONFIG:-/home/admin/.hermes/config.yaml}:/opt/data/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/api/tools -H 'Authorization: Bearer ${HERMES_API_KEY:-ailab-hermes-2026}' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  ailab-net:
    driver: bridge
