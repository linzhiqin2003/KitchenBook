# ==============================================================
# Nginx 配置 - lzqqq.org
#
# 部署模型：Cloudflare Flexible SSL
#   浏览器 ──HTTPS──► Cloudflare ──HTTP──► 源站 nginx (本机 :80)
# 源站只监听 80；HTTPS 由 Cloudflare 在 edge 终结，源站不持有证书。
# 把"Always Use HTTPS"留给 Cloudflare（Page Rules / SSL/TLS 设置）即可，
# 源站不再做 80→443 重定向（否则会和主 server 块的 :80 listen 冲突）。
# ==============================================================

# ==============================================================
# 主域：lzqqq.org / www.lzqqq.org
# 根路径 → /kitchen，挂载所有功能模块（厨房/博客/出题/游戏/记账）
# agent.lzqqq.org 走下面单独的 server 块，独立的 root location 直接挂 ailab
# ==============================================================
server {
    listen 80;
    server_name lzqqq.org www.lzqqq.org;
    client_max_body_size 50M;

    # ========================================
    # Kitchen 模块 - /kitchen 路径
    # ========================================
    location /kitchen {
        alias /home/admin/KitchenBook/frontend/dist;
        try_files $uri $uri/ /kitchen/index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        location ~* ^/kitchen/.*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================
    # Blog 模块 - /blog 路径
    # ========================================
    location /blog {
        alias /home/admin/KitchenBook/frontend/dist;
        try_files $uri $uri/ /blog/index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        location ~* ^/blog/.*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================
    # QuestionGen 模块 - /questiongen 路径
    # ========================================
    location /questiongen {
        alias /home/admin/KitchenBook/frontend/dist;
        try_files $uri $uri/ /questiongen/index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        location ~* ^/questiongen/.*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================
    # Receipts 模块 - /receipts 路径
    # ========================================
    location /receipts {
        alias /home/admin/KitchenBook/receipts-frontend/dist;
        try_files $uri $uri/ /receipts/index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        location ~* ^/receipts/.*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================
    # Games 模块 - /games 路径
    # ========================================
    location /games {
        alias /home/admin/KitchenBook/frontend/dist;
        try_files $uri $uri/ /games/index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        location ~* ^/games/.*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================
    # 主域根路径：服务 PortfolioHome（Vue SPA index.html）
    # 旧规则是 301 → /kitchen，现已切换到个人主页
    # ========================================
    location = / {
        root /home/admin/KitchenBook/frontend/dist;
        try_files /index.html =404;
    }

    # 根目录下的 SPA 静态资源（avatar.jpg / favicon.svg / tarot-table-bg.png 等）
    # regex 仅匹配单段路径，不会吸走 /kitchen/*.jpg、/blog/*.png 等子前缀
    location ~* ^/[^/]+\.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        root /home/admin/KitchenBook/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 其他主域 SPA 路由（/login、/tarot、/tarot/ritual...）— fallback 到 SPA index.html
    location ~ ^/(login|tarot)(/.*)?$ {
        root /home/admin/KitchenBook/frontend/dist;
        try_files $uri /index.html;
    }

    # ========================================
    # 前端静态资源 (Vite 构建产物)
    # ========================================
    location /assets {
        alias /home/admin/KitchenBook/frontend/dist/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    }

    # Django 静态文件
    location /static/ {
        alias /home/admin/KitchenBook/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Django 媒体文件
    location /media/ {
        alias /home/admin/KitchenBook/backend/media/;
        expires 1y;
        add_header Cache-Control "public";
    }

    # ========================================
    # Django API
    # ========================================
    # Receipts Upload Stream (SSE)
    location /receipts/api/receipts/upload-stream/ {
        proxy_pass http://unix:/home/admin/KitchenBook/backend/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Receipts API
    location /receipts/api/ {
        proxy_pass http://unix:/home/admin/KitchenBook/backend/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://unix:/home/admin/KitchenBook/backend/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # AI 流式接口 - 需要特殊配置以支持 SSE
    location /api/ai/ {
        proxy_pass http://unix:/home/admin/KitchenBook/backend/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ========================================
    # Hermes Agent API (AI Lab) — Per-user routing
    # 每个用户路由到各自的 Docker 容器（端口 8642 + N）
    # 前端通过 /api/ai/me/ 返回的 hermes_path 知道自己该请求哪个路径
    # ========================================
    # User 3 (owner) → 127.0.0.1:8642
    location /hermes/u3/ {
        proxy_pass http://127.0.0.1:8642/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # User 9 → 127.0.0.1:8643
    location /hermes/u9/ {
        proxy_pass http://127.0.0.1:8643/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # User 550 → 127.0.0.1:8644
    location /hermes/u550/ {
        proxy_pass http://127.0.0.1:8644/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 兼容：/hermes/ 默认指向 owner 容器（开发/旧路径兜底）
    location = /hermes {
        return 308 /hermes/;
    }

    location /hermes/ {
        proxy_pass http://127.0.0.1:8642/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ========================================
    # WebSocket: Qwen3-ASR streaming (GPU server)
    # ========================================
    location /ws/asr/ {
        rewrite ^/ws/asr/(.*) /ws/$1 break;
        proxy_pass http://117.50.185.34:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # ========================================
    # WebSocket (AI Lab + Games)
    # ========================================
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://unix:/home/admin/KitchenBook/backend/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# ==============================================================
# Agent 子域：agent.lzqqq.org
# 根路径直接挂 SPA（MyAgent），不做 /kitchen 重定向，避免厨房页闪现
# 不挂载 /kitchen /blog /questiongen /games /receipts /admin/ 等路径，
# 这些路径在 SPA 内由前端 router 守卫拦截跳回 ai-lab 根
# ==============================================================
server {
    listen 80;
    server_name agent.lzqqq.org;
    client_max_body_size 50M;

    # ----------------------------------------------------------
    # SPA 入口：根路径直出 frontend/dist/index.html
    # 任何前端路由（/、/studio、/activate、/admin/invites、/admin/usage 等）
    # 都 fallback 到同一份 index.html，由 Vue Router 在客户端分发
    # ----------------------------------------------------------
    location / {
        root /home/admin/KitchenBook/frontend/dist;
        try_files $uri $uri/ /index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    }

    # 前端构建产物（与主域共用同一份 dist）
    location /assets {
        alias /home/admin/KitchenBook/frontend/dist/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    }

    # Django 静态/媒体文件
    location /static/ {
        alias /home/admin/KitchenBook/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/admin/KitchenBook/backend/media/;
        expires 1y;
        add_header Cache-Control "public";
    }

    # ----------------------------------------------------------
    # Django API（与主域共享同一后端）
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://unix:/home/admin/KitchenBook/backend/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # AI 流式接口 (SSE)
    location /api/ai/ {
        proxy_pass http://unix:/home/admin/KitchenBook/backend/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ----------------------------------------------------------
    # Hermes Agent (AI Lab 核心) — Per-user routing
    # ----------------------------------------------------------
    location /hermes/u3/ {
        proxy_pass http://127.0.0.1:8642/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /hermes/u9/ {
        proxy_pass http://127.0.0.1:8643/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /hermes/u550/ {
        proxy_pass http://127.0.0.1:8644/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /hermes {
        return 308 /hermes/;
    }

    location /hermes/ {
        proxy_pass http://127.0.0.1:8642/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ----------------------------------------------------------
    # WebSocket: ASR 流式（GPU 服务器）
    # ----------------------------------------------------------
    location /ws/asr/ {
        rewrite ^/ws/asr/(.*) /ws/$1 break;
        proxy_pass http://117.50.185.34:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # WebSocket: Daphne（AI Lab 协作通道）
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # 注意：故意不挂 /admin/ 反代 — 让 SPA 处理 /admin/invites /admin/usage 路由
    # 同时 Django admin 不再从 agent 子域暴露（仍可从主域 lzqqq.org/admin/ 访问）

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# ==============================================================
# 旧域名重定向配置（迁移期间使用）
# ==============================================================
server {
    listen 80;
    server_name lzqqqkitchen.org www.lzqqqkitchen.org;

    # 旧的根路径 -> 新的 /kitchen
    location = / {
        return 301 https://www.lzqqq.org/kitchen$is_args$args;
    }

    # 保持其他路径结构
    location / {
        return 301 https://www.lzqqq.org/kitchen$request_uri;
    }
}
