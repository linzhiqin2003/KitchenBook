<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LZQ的技术博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- QuestionGen refined Apple-style typography stack -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      // Sync the QuestionGen surface theme before Vue mounts (no flash)
      (function(){
        var qt = localStorage.getItem('qg_theme');
        if (qt === 'dark') document.documentElement.setAttribute('data-qg-theme', 'dark');
        else if (qt === 'light') document.documentElement.setAttribute('data-qg-theme', 'light');
        else document.documentElement.setAttribute('data-qg-theme', window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <script>
      // 在 Vue 挂载前同步设置背景色，防止主题闪烁
      (function(){
        var t = localStorage.getItem('blog_theme');
        if (t === 'light') document.body.style.backgroundColor = '#fcfbf7';
        else if (t === 'dark' || !t) document.body.style.backgroundColor = '#0a0a0f';
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
