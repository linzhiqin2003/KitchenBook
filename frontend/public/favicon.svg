<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1e0a3c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="stroke-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Hexagon border frame -->
  <polygon
    points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5"
    fill="none"
    stroke="url(#stroke-grad)"
    stroke-width="1.5"
    opacity="0.6"
  />

  <!-- Inner hexagon accent -->
  <polygon
    points="50,14 83,32 83,68 50,86 17,68 17,32"
    fill="none"
    stroke="url(#glow)"
    stroke-width="0.5"
    opacity="0.25"
  />

  <!-- Corner sparkle dots -->
  <circle cx="50" cy="4"  r="2" fill="#a78bfa" opacity="0.9"/>
  <circle cx="93" cy="27.5" r="2" fill="#7c3aed" opacity="0.7"/>
  <circle cx="93" cy="72.5" r="2" fill="#0891b2" opacity="0.7"/>
  <circle cx="50" cy="96" r="2" fill="#22d3ee" opacity="0.9"/>
  <circle cx="7"  cy="72.5" r="2" fill="#0891b2" opacity="0.7"/>
  <circle cx="7"  cy="27.5" r="2" fill="#7c3aed" opacity="0.7"/>

  <!-- Main monogram: bold "L" -->
  <text
    x="32" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="62"
    fill="url(#glow)"
    filter="url(#blur-glow)"
  >L</text>

  <!-- Superscript "ZQ" top-right -->
  <text
    x="62" y="44"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="22"
    fill="url(#glow)"
    opacity="0.85"
  >ZQ</text>

  <!-- Diagonal accent slash between L and ZQ -->
  <line x1="58" y1="48" x2="64" y2="60" stroke="url(#glow)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
</svg>
